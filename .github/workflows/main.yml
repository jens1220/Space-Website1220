name: CI/CD Pipeline

# 1. Trigger: Run this workflow whenever someone pushes to the 'main' branch
on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Automated Testing (CI)
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run automated tests
      run: npm test

  # JOB 2: Automated Deployment (CD)
  deploy:
    runs-on: ubuntu-latest
    needs: test # CRITICAL: This job only runs if the 'test' job passes!

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Example deploying to a service like Render or Vercel via a Webhook URL
    - name: Deploy to Production
      run: curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}